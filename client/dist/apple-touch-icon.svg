<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="36" fill="#FAF7F2"/>
  <!-- Back card, tilted left -->
  <g transform="translate(90,96) rotate(-14)">
    <rect x="-38" y="-50" width="76" height="100" rx="10" fill="#F0EBE3" stroke="#E8732A" stroke-width="3"/>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="44" fill="#C5611F">3</text>
  </g>
  <!-- Middle card, straight -->
  <g transform="translate(90,90) rotate(0)">
    <rect x="-38" y="-50" width="76" height="100" rx="10" fill="#FFFFFF" stroke="#E8732A" stroke-width="3"/>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="44" fill="#E8732A">1</text>
  </g>
  <!-- Front card, tilted right -->
  <g transform="translate(90,96) rotate(14)">
    <rect x="-38" y="-50" width="76" height="100" rx="10" fill="#E8732A"/>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="44" fill="#FFFFFF">2</text>
  </g>
  <!-- Fun sparkles -->
  <circle cx="150" cy="24" r="7" fill="#E8732A"/>
  <circle cx="30" cy="30" r="4" fill="#E8732A" opacity="0.5"/>
  <circle cx="160" cy="50" r="3" fill="#E8732A" opacity="0.35"/>
</svg>
